<!doctype html>
<html lang="fr">
<head>

      height:100vh;
      text-align:center;
    }
    .card{
      background:#1e293b;
      padding:40px;

    p{
      opacity:0.85;

    }
    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 20px;
      background:#38bdf8;
      color:#0f172a;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
    }

</head>
<body>
  <div class="card">
    <h1>ADA Automation</h1>
    <p>
      Nous automatisons les processus pour les entreprises en Suisse romande.

</html>
